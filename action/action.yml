name: 'OWASP Agent Memory Guard Scan'
description: 'Scan AI agent code for memory poisoning vulnerabilities (OWASP ASI06). Detects prompt injection, secret leakage, tool abuse, privilege escalation, excessive autonomy, and cross-task contamination.'
author: 'OWASP Agent Memory Guard Project'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-path:
    description: 'Path to scan for agent memory operations (default: entire repo)'
    required: false
    default: '.'
  fail-on-findings:
    description: 'Fail the workflow if vulnerabilities are found'
    required: false
    default: 'true'
  include-patterns:
    description: 'Comma-separated glob patterns for files to include (e.g., "**/*.py,**/*.js")'
    required: false
    default: '**/*.py'
  exclude-patterns:
    description: 'Comma-separated glob patterns for files to exclude'
    required: false
    default: '**/test*/**,**/node_modules/**,**/.venv/**'
  min-severity:
    description: 'Minimum severity to report: low, medium, high, critical'
    required: false
    default: 'medium'
  output-format:
    description: 'Output format: text, json, sarif'
    required: false
    default: 'sarif'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Security tab'
    required: false
    default: 'true'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  findings-count:
    description: 'Total number of findings detected'
    value: ${{ steps.scan.outputs.findings-count }}
  critical-count:
    description: 'Number of critical severity findings'
    value: ${{ steps.scan.outputs.critical-count }}
  high-count:
    description: 'Number of high severity findings'
    value: ${{ steps.scan.outputs.high-count }}
  report-path:
    description: 'Path to the generated report file'
    value: ${{ steps.scan.outputs.report-path }}
  sarif-path:
    description: 'Path to SARIF output (for GitHub Security tab integration)'
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Agent Memory Guard
      shell: bash
      run: |
        pip install --quiet agent-memory-guard

    - name: Run Memory Security Scan
      id: scan
      shell: bash
      run: |
        set +e

        # Determine output file extension
        if [ "${{ inputs.output-format }}" = "sarif" ]; then
          REPORT_FILE="amg-results.sarif"
        elif [ "${{ inputs.output-format }}" = "json" ]; then
          REPORT_FILE="amg-results.json"
        else
          REPORT_FILE="amg-results.txt"
        fi

        # Run the scan
        amg scan "${{ inputs.scan-path }}" \
          --severity "${{ inputs.min-severity }}" \
          --format "${{ inputs.output-format }}" \
          --include "${{ inputs.include-patterns }}" \
          --exclude "${{ inputs.exclude-patterns }}" \
          --output "$REPORT_FILE" \
          ${{ inputs.fail-on-findings == 'true' && '--fail-on-findings' || '' }}

        SCAN_EXIT=$?

        # Parse findings count from JSON/SARIF
        if [ "${{ inputs.output-format }}" = "sarif" ] || [ "${{ inputs.output-format }}" = "json" ]; then
          FINDINGS=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('$REPORT_FILE'))
            if 'runs' in data:  # SARIF
                results = data.get('runs', [{}])[0].get('results', [])
                total = len(results)
                critical = sum(1 for r in results if r.get('level') == 'error')
                high = critical
            else:  # JSON
                total = data.get('summary', {}).get('total_findings', 0)
                critical = data.get('summary', {}).get('critical', 0)
                high = data.get('summary', {}).get('high', 0)
            print(f'{total},{critical},{high}')
        except:
            print('0,0,0')
        ")
          IFS=',' read -r TOTAL CRITICAL HIGH <<< "$FINDINGS"
        else
          TOTAL="unknown"
          CRITICAL="unknown"
          HIGH="unknown"
        fi

        # Set outputs
        echo "findings-count=$TOTAL" >> $GITHUB_OUTPUT
        echo "critical-count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=$HIGH" >> $GITHUB_OUTPUT
        echo "report-path=$REPORT_FILE" >> $GITHUB_OUTPUT
        echo "sarif-path=$REPORT_FILE" >> $GITHUB_OUTPUT

        # Print summary
        echo "## 🛡️ Agent Memory Guard Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$TOTAL" != "0" ] && [ "$TOTAL" != "unknown" ]; then
          echo "⚠️ **$TOTAL finding(s) detected** ($CRITICAL critical, $HIGH high)" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ No memory security vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Report: \`$REPORT_FILE\`" >> $GITHUB_STEP_SUMMARY

        exit $SCAN_EXIT

    - name: Upload SARIF to GitHub Security
      if: inputs.upload-sarif == 'true' && (inputs.output-format == 'sarif') && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}
      continue-on-error: true

    - name: Upload scan report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: amg-security-report
        path: ${{ steps.scan.outputs.report-path }}
      continue-on-error: true
